<body>

  <main class="app-shell" id="main">
    <div class="redirect-page" id="redirectPage"></div>
    <div class="seo-keywords-footer" id="seoFooter"></div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';
      const title = params.get('title') || '';
      const site = params.get('site') || '';
      const extra = params.get('extra') || '';
      const time = params.get('time') || '';
      const logo = params.get('logo') || '';
      const thumbnail = params.get('thumbnail') || '';
      const targetParam = params.get('url') || '';

      let targetUrl = '';
      if (targetParam) {
        try {
          targetUrl = decodeURIComponent(escape(atob(targetParam)));
        } catch {
          targetUrl = '';
        }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      // Update SEO meta dynamically
      if (title) {
        document.title = title + ' - 51吃瓜 | MarkdownExam';
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.content = '51吃瓜（51chigua）为您推荐：' + (site ? site + (extra ? ' · ' + extra : '') + ' ' : '') + title;
        const kw = document.querySelector('meta[name="keywords"]');
        if (kw) kw.content = title + ',' + site + ',51吃瓜,51chigua,吃瓜,热门,热搜';
        const og = document.querySelector('meta[property="og:title"]');
        if (og) og.content = title + ' - 51吃瓜';
        const ogDesc = document.querySelector('meta[property="og:description"]');
        if (ogDesc) ogDesc.content = '51吃瓜（51chigua）为您推荐：' + title;
        const ogImg = document.getElementById('ogImage');
        if (ogImg && thumbnail) ogImg.content = thumbnail;
        const tw = document.querySelector('meta[name="twitter:title"]');
        if (tw) tw.content = title + ' - 51吃瓜';
        const twDesc = document.querySelector('meta[name="twitter:description"]');
        if (twDesc) twDesc.content = '51吃瓜（51chigua）为您推荐：' + title;
      }

      const main = document.getElementById('main');
      const page = document.getElementById('redirectPage');

      if (!targetUrl) {
        page.innerHTML = '<div class="notice">找不到跳转链接。<a href="index.html#/news" style="color:var(--primary)">返回51吃瓜新闻页</a></div>';
        return;
      }

      function formatNewsTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(Number(timestamp) * 1000);
        const now = new Date();
        const diff = Math.floor((now - date) / 60000);
        if (diff < 1) return '刚刚';
        if (diff < 60) return diff + ' 分钟前';
        if (diff < 1440) return Math.floor(diff / 60) + ' 小时前';
        return date.toLocaleDateString('zh-CN');
      }

      function truncateUrl(url) {
        try {
          const u = new URL(url);
          return u.hostname + (u.pathname === '/' ? '' : u.pathname);
        } catch {
          return url.length > 60 ? url.substring(0, 60) + '…' : url;
        }
      }

      const hasThumbnail = thumbnail !== '';
      const hasLogo = logo !== '';
      const COUNTDOWN = 5;

      page.innerHTML = `
        <div class="redirect-card">
          ${hasThumbnail ? `<div class="redirect-image"><img src="${escapeHtml(thumbnail)}" alt="${escapeHtml(title)} - 51吃瓜" width="520" height="240"></div>` : ''}
          <div class="redirect-info">
            <div class="redirect-source">
              ${hasLogo ? `<img class="news-logo" src="${escapeHtml(logo)}" alt="${escapeHtml(site)}" width="16" height="16" onerror="this.style.display='none'">` : ''}
              <span class="news-site">${escapeHtml(site)}</span>
              ${extra ? `<span class="news-extra">${escapeHtml(extra)}</span>` : ''}
              ${time ? `<span class="news-time">${formatNewsTime(time)}</span>` : ''}
            </div>
            <h2>${escapeHtml(title)}</h2>
          </div>
          <div class="redirect-target-url">
            <a href="${escapeHtml(targetUrl)}" target="_blank" rel="noopener" title="51吃瓜 - ${escapeHtml(title)} - 原文链接">${escapeHtml(truncateUrl(targetUrl))}</a>
          </div>
          <div class="redirect-actions">
            <a class="button-link primary" href="${escapeHtml(targetUrl)}" target="_blank" rel="noopener" title="51吃瓜 - 立即打开 ${escapeHtml(title)}">立即打开 - ${escapeHtml(title)}</a>
          </div>
          <div class="redirect-countdown" id="countdownArea">
            <span>正在跳转到外部链接，<strong id="countdownNum">${COUNTDOWN}</strong> 秒后自动跳转…</span>
            <div class="redirect-countdown-actions">
              <button type="button" id="cancelBtn">取消</button>
              <button type="button" id="backBtn">返回</button>
            </div>
          </div>
        </div>
      `;

      // SEO keywords footer
      document.getElementById('seoFooter').innerHTML =
        '51吃瓜 · 51chigua · 吃瓜 · <a href="index.html#/news">今日头条</a> · <a href="index.html#/news">微博热搜</a> · <a href="index.html#/news">抖音热榜</a> · <a href="index.html#/news">热门爆料</a> · <a href="index.html#/news">热点资讯</a> · <a href="index.html#/news">51吃瓜官网</a>';

      // Image error fallback
      main.addEventListener('error', function (e) {
        const img = e.target;
        if (img.tagName !== 'IMG') return;
        e.stopPropagation();
        const container = img.closest('.redirect-image');
        if (container && !container.querySelector('.img-fallback')) {
          img.style.display = 'none';
          const fb = document.createElement('div');
          fb.className = 'img-fallback';
          container.appendChild(fb);
        } else {
          img.style.display = 'none';
        }
      }, true);

      // Theme toggle
      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('markdown_exam_theme', theme);
      }
      setTheme(localStorage.getItem('markdown_exam_theme') || 'light');
      document.getElementById('themeToggle').addEventListener('click', function () {
        setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
      });

      // Countdown
      let countdown = COUNTDOWN;
      let cancelled = false;
      const timer = setInterval(function () {
        if (cancelled) return;
        countdown--;
        var num = document.getElementById('countdownNum');
        if (num) num.textContent = countdown;
        if (countdown <= 0) {
          clearInterval(timer);
          window.location.href = targetUrl;
        }
      }, 1000);

      // Cancel
      document.getElementById('cancelBtn').addEventListener('click', function () {
        cancelled = true;
        clearInterval(timer);
        var area = document.getElementById('countdownArea');
        if (area) {
          area.innerHTML = '<span>跳转已取消。</span><div class="redirect-countdown-actions"><button type="button" id="backBtn2">返回51吃瓜新闻页</button></div>';
          document.getElementById('backBtn2').addEventListener('click', function () {
            window.location.href = 'index.html#/news';
          });
        }
      });

      // Back button
      document.getElementById('backBtn').addEventListener('click', function () {
        window.location.href = 'index.html#/news';
      });

      // ESC to cancel
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !cancelled) {
          document.getElementById('cancelBtn').click();
        }
      });
    })();
  </script>
